<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGMS 毕业论文管理系统 - 页面演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f6f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 520px; width: 100%; padding: 32px 20px; }
  h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #8c8c9a; margin-bottom: 28px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); padding: 20px 24px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; transition: box-shadow .2s; }
  .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); }
  .card-left { display: flex; align-items: center; gap: 14px; }
  .icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .icon-blue { background: #e8f0fe; }
  .icon-green { background: #e6f7ee; }
  .icon-purple { background: #f0e8fe; }
  .icon-orange { background: #fff3e6; }
  .icon-teal { background: #e6f7f5; }
  .card-title { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .card-desc { font-size: 12px; color: #8c8c9a; margin-top: 2px; }
  .card a { font-size: 13px; color: #4e6ef2; text-decoration: none; white-space: nowrap; font-weight: 500; }
  .card a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>VGMS 毕业论文管理系统</h1>
  <p class="subtitle">各角色首页 & 工作台演示版</p>

  <div class="card">
    <div class="card-left">
      <div class="icon icon-blue">&#128187;</div>
      <div><div class="card-title">工作台</div><div class="card-desc">多角色统一工作台 v4</div></div>
    </div>
    <a href="workbench.html">打开 &rarr;</a>
  </div>

  <div class="card">
    <div class="card-left">
      <div class="icon icon-green">&#128105;&#8205;&#127979;</div>
      <div><div class="card-title">指导教师首页</div><div class="card-desc">指导教师视角 v4</div></div>
    </div>
    <a href="advisor.html">打开 &rarr;</a>
  </div>

  <div class="card">
    <div class="card-left">
      <div class="icon icon-purple">&#127891;</div>
      <div><div class="card-title">学生首页</div><div class="card-desc">学生视角 v3</div></div>
    </div>
    <a href="student.html">打开 &rarr;</a>
  </div>

  <div class="card">
    <div class="card-left">
      <div class="icon icon-orange">&#128203;</div>
      <div><div class="card-title">评阅教师首页</div><div class="card-desc">评阅教师视角 v1</div></div>
    </div>
    <a href="reviewer.html">打开 &rarr;</a>
  </div>

  <div class="card">
    <div class="card-left">
      <div class="icon icon-teal">&#128736;</div>
      <div><div class="card-title">校级管理员首页</div><div class="card-desc">管理员视角 v1</div></div>
    </div>
    <a href="admin.html">打开 &rarr;</a>
  </div>
</div>
</body>
</html>
